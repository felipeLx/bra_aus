app = "bra-aus"   
primary_region = "syd"    # Sydney — closest to your users

[build]

# Runs in the new container BEFORE traffic is switched over.
# Applies any pending DB migrations safely.
[deploy]
  release_command = "bun prisma migrate deploy"

[env]
  NODE_ENV = "production"
  PORT     = "8080"

[http_service]
  internal_port       = 8080
  force_https         = true
  auto_stop_machines  = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  size = "shared-cpu-1x"   # 256 MB RAM — plenty for low traffic
